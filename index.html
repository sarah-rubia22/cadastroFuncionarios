<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">





    <style>
        .roxo {
            background: linear-gradient(135deg, #a10962, #e8ec89);
            color: white;
        }

        .rounded-custom {
            border-radius: 20px;
        }

        
    </style>
</head>

<body >

    <div class=" d-flex align-items-center justify-content-center ">
        <div class="row w-100 w-lg-75  ">


            <div
                class="col-12 col-lg-4 roxo d-flex flex-column justify-content-center align-items-center text-center ">
                <h2 class="fw-bold fs-1">Bem-vindo!</h2>
                <p class="fs-4">Preencha as informações para continuar</p>


            </div>

            <div class="col-12 col-lg-8  p-4 ">

                <h5 class="mb-4 fs-2">Endereço de Cobrança</h5>

                <form class="row g-3">

                    <div class="col-12 col-md-6 fw-bold fs-6 ">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-12 col-md-6 fs-6 fw-bold">
                        <label class="form-label">Sobrenome</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-12 col-md-6 fw-bold fs-6 ">
                        <label class="form-label">Nome de Usuário</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-12 fs-6 fw-bold">
                        <label class="form-label">E-mail</label>
                        <input type="email" class="form-control">
                    </div>

                    <div class="col-12 fs-6 fw-bold">
                        <label class="form-label">Endereço</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-12 col-md-6 fw-bold fs-6">

                        <label for="pais" class="form-label">País</label>
                        
                        <select id="pais" class="form-select">
                            <option selected disabled>Escolher...</option>
                            <option >Brasil</option>
                            <option>Estados Unidos</option>
                            <option >Canadá</option>
                            <option >Portugal</option>
                            <option >Espanha</option>
                            <option >França</option>
                            <option >Alemanha</option>
                            <option >Itália</option>
                            <option >Japão</option>
                            <option>Argentina</option>
                            <option >Outros</option>
                        </select>
                    </div>


                    <div class="col-12 col-md-6 fw-bold fs-6">
                        <label for="estado" class="form-label">Estado</label>
                        <select id="estado" class="form-select">
                            <option selected disabled>Escolher...</option>
                            <option>São Paulo </option>
                            <option>Califórnia </option>
                            <option>Ontário </option>
                            <option>Lisboa </option>
                            <option>Madri </option>
                            <option>Île-de-France</option>
                            <option>Baviera </option>
                            <option>Lácio </option>
                            <option>Tóquio </option>
                            <option>Buenos Aires </option>
                        </select>
                    </div>


                    <hr class="my-4">


                    <div class="form-check">

                        <input type="checkbox" id="opção" class="form-check-input">

                        <label for="opcao" class="form-check-label">O endereço de entrega é o mesmo que o endereço de cobrança</label>

                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="opcao 2" class="form-check-input">

                        <label for="opcao 2" class="form-check-label">Salve as informações para a proxima vez</label>

                    </div>

                    <h5>Pagamento</h5>

                    <div class="col-12  ">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="pagamento" checked>
                            <label class="form-check-label">Cartão de crédito</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="pagamento">
                            <label class="form-check-label">Cartão de débito</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="pagamento">
                            <label class="form-check-label">Pix</label>
                        </div>
                    </div>

                    <div class="col-12 col-md-6 fs-6 fw-bold">
                        <label class="form-label">Nome no cartão</label>
                        <input type="text" class="form-control" placeholder="Nome completo comforme consta no cartão">
                         
                    </div>

                    <div class="col-12 col-md-6 fs-6 fw-bold">
                        <label class="form-label">Número do cartão</label>
                        <input type="text" class="form-control" placeholder="1234 5678 8765 4321">
                    </div>

                    <div class="col-6 col-md-3 fs-6 fw-bold">
                        <label class="form-label">Validade</label>
                        <input type="text" class="form-control" placeholder="MM/AA">
                    </div>

                    <div class="col-6 col-md-3 fs-6 fw-bold">
                        <label class="form-label">CVV</label>
                        <input type="text" class="form-control" placeholder="CVV/CVC">
                    </div>

                    <div class="col-12">
                        <button class="btn btn-secondary w-100 mt-3">
                            Continuar para checkout
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>

</body>

</html>
